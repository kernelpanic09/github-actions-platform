name: Bug report
description: Something isn't working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's going wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error output from the Actions run.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / environment
      description: Workflow/action version tag, runner OS, relevant tool versions (Terraform, Helm, etc.)
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal calling workflow that reproduces the issue (optional but very helpful)
    validations:
      required: false
