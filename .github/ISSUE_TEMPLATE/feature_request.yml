name: Feature request
description: Suggest a new workflow, action, or improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to add or change?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case / why
      description: What CI/CD problem does this solve? What would callers be able to do that they can't today?
    validations:
      required: false
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: Any thoughts on the interface (inputs, outputs, steps)? (optional)
    validations:
      required: false
