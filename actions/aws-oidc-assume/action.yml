name: AWS OIDC Assume Role
description: >
  Assume an AWS IAM role using GitHub Actions OIDC. Wraps
  aws-actions/configure-aws-credentials and exports the account ID as an output.
author: kernelpanic09

branding:
  icon: lock
  color: orange

inputs:
  role_arn:
    description: "IAM role ARN to assume (e.g. arn:aws:iam::123456789012:role/my-role)"
    required: true
  region:
    description: "AWS region"
    required: false
    default: "us-east-1"
  role_session_name:
    description: "Session name for the assumed role. Defaults to github-actions-<run_id>-<run_attempt>."
    required: false
    default: ""
  role_duration_seconds:
    description: "Duration of the assumed role session in seconds"
    required: false
    default: "3600"

outputs:
  account_id:
    description: "AWS account ID of the assumed role"
    value: ${{ steps.account.outputs.account_id }}

runs:
  using: composite

  steps:
    - name: Derive session name
      id: session
      shell: bash
      run: |
        if [[ -n "${{ inputs.role_session_name }}" ]]; then
          echo "name=${{ inputs.role_session_name }}" >> "$GITHUB_OUTPUT"
        else
          # Include run_id and run_attempt so retries get a distinct session
          echo "name=github-actions-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role_arn }}
        aws-region: ${{ inputs.region }}
        role-session-name: ${{ steps.session.outputs.name }}
        role-duration-seconds: ${{ inputs.role_duration_seconds }}

    - name: Get account ID
      id: account
      shell: bash
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
